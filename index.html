<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIVIM PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

<style>
body{margin:0;background:#0c0e14;color:#fff;font-family:sans-serif}
#cats{display:flex;overflow-x:auto;padding:10px;gap:6px}
.cat{padding:6px 12px;background:#1e2235;border-radius:20px;cursor:pointer;white-space:nowrap}
.cat.foc{outline:2px solid #4a7aff}

#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#1e2235;padding:10px;border-radius:10px;text-align:center;cursor:pointer}
.card.foc{outline:2px solid #4a7aff;transform:scale(1.05)}

#player{position:fixed;inset:0;background:#000;display:none}
video{width:100%;height:100%}
</style>
</head>

<body>

<div id="cats"></div>
<div id="grid"></div>

<div id="player">
<video id="video" autoplay></video>
</div>

<script>
const URL="https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/merged.m3u"

const video=document.getElementById("video")

let hls=null
let channels=[]
let filtered=[]
let cats=[]
let fi=0
let navMode="grid"
let curIndex=0

/* ================= PARSER ================= */
function parseM3U(text){
 const lines=text.split("\n")
 let list=[],info=null

 lines.forEach(l=>{
  if(l.startsWith("#EXTINF")){
   info={
    name:l.split(",")[1]||"Kanal",
    group:(l.match(/group-title="(.*?)"/)||[])[1]||"Diğer"
   }
  }
  else if(l && !l.startsWith("#") && info){
   list.push({...info,url:l})
   info=null
  }
 })
 return list
}

/* ================= LOAD ================= */
async function load(){
 const txt=await fetch(URL).then(r=>r.text())
 channels=parseM3U(txt)
 filtered=[...channels]
 buildCats()
 renderCats()
 renderGrid()
}

/* ================= CATS ================= */
function buildCats(){
 const map={}
 channels.forEach(c=>{
  map[c.group]=(map[c.group]||0)+1
 })
 cats=Object.keys(map)
}

function renderCats(){
 const el=document.getElementById("cats")
 el.innerHTML=""

 cats.forEach(c=>{
  const b=document.createElement("div")
  b.className="cat"
  b.innerText=c
  b.onclick=()=>filterCat(c)
  el.appendChild(b)
 })
}

/* ================= FILTER ================= */
function filterCat(c){
 filtered=channels.filter(x=>x.group===c)
 renderGrid()
 setTimeout(()=>focusCard(0),50)
}

/* ================= GRID ================= */
renderGrid(){
 const g=$('grd'),nd=$('noD')

 if(!this.flt.length){
  g.innerHTML=''
  nd.classList.remove('hidden')
  return
 }

 nd.classList.add('hidden')

 const frag=document.createDocumentFragment()

 this.flt.slice(0,300).forEach(ch=>{
  const d=document.createElement('div')
  d.className='crd'
  d.dataset.id=ch.id

  d.innerHTML=`
    <span class="crd-n">${ch.num}</span>
    <div class="crd-ph">${ch.name[0]}</div>
    <div class="crd-nm">${ch.name}</div>
  `

  frag.appendChild(d)
 })

 g.innerHTML=''
 g.appendChild(frag)
}

/* ================= PLAYER ================= */
const preloadMap=new Map()

function preload(ch){
 if(preloadMap.has(ch.url)) return

 const V={
 el:null,hls:null,ch:null,
 preloadMap:new Map(),

 init(){
  this.el=$('vid')
 },

 async play(ch){
  this.ch=ch
  this.stop()

  $('player').classList.remove('hidden')
  $('pL').classList.remove('hidden')

  const pre=this.preloadMap.get(ch.id)

  try{
    if(pre){
      if(pre.hls){
        this.hls=pre.hls
        this.hls.attachMedia(this.el)
      }else{
        this.el.src=pre.v.src
      }
      this.preloadMap.delete(ch.id)
    }else{
      await this.load(ch)
    }

    this.el.play()
    $('pL').classList.add('hidden')

    this.preloadNext()

  }catch(e){
    this.fail()
  }
 },

 async load(ch){
  const url=ch.url

  if(Hls.isSupported() && url.includes('.m3u8')){
    return new Promise((ok,no)=>{
      const h=new Hls({
        maxBufferLength:60,
        fragLoadingMaxRetry:8
      })

      h.loadSource(url)
      h.attachMedia(this.el)

      h.on(Hls.Events.MANIFEST_PARSED,()=>ok())

      h.on(Hls.Events.ERROR,(e,d)=>{
        if(d.fatal){
          h.destroy()
          this.loadDirect(url).then(ok).catch(no)
        }
      })

      this.hls=h
    })
  }

  return this.loadDirect(url)
 },

 loadDirect(url){
  return new Promise((ok,no)=>{
    this.el.src=url
    this.el.oncanplay=()=>ok()
    this.el.onerror=()=>no()
  })
 },

 preload(ch){
  if(this.preloadMap.has(ch.id)) return

  const v=document.createElement('video')
  v.muted=true

  if(Hls.isSupported() && ch.url.includes('.m3u8')){
    const h=new Hls()
    h.loadSource(ch.url)
    h.attachMedia(v)
    this.preloadMap.set(ch.id,{v,h})
  }else{
    v.src=ch.url
    v.load()
    this.preloadMap.set(ch.id,{v})
  }
 },

 preloadNext(){
  const i=A.curI
  const list=A.flt

  if(list[i+1]) this.preload(list[i+1])
  if(list[i-1]) this.preload(list[i-1])
 },

 stop(){
  if(this.hls){this.hls.destroy();this.hls=null}
  this.el.src=''
 },

 fail(){
  $('pL').classList.add('hidden')
  $('pE').classList.remove('hidden')
 }
}

/* ================= NAV ================= */
function focusCard(i){
 const cards=document.querySelectorAll(".card")
 cards.forEach(c=>c.classList.remove("foc"))
 if(cards[i]){
  cards[i].classList.add("foc")
  cards[i].scrollIntoView({block:"nearest"})
 }
 fi=i
}

/* ================= REMOTE ================= */
let navLock=false

document.addEventListener('keydown',e=>{
 if(navLock) return
 navLock=true
 setTimeout(()=>navLock=false,70)

 const k=e.key

 if(k==="ArrowUp") A.navG('u')
 if(k==="ArrowDown") A.navG('d')
 if(k==="ArrowLeft") A.navG('l')
 if(k==="ArrowRight") A.navG('r')

 if(k==="Enter"){
   const fc=document.querySelector('.crd.foc')
   if(fc) A.playCh(fc.dataset.id)
 }

 if(k==="Escape" || k==="Backspace"){
   if(A.pVis()) A.closeP()
 }

 // kanal zap
 if(k==="PageDown") A.nextCh()
 if(k==="PageUp") A.prevCh()
})

/* ================= START ================= */
load()
</script>

</body>
</html>
