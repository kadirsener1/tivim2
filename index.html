<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TİVİM - Canlı TV</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0c0e14;--bg2:#151825;--bg3:#1e2235;--bg4:#282d48;
            --acc:#4a7aff;--acc2:#7b5cfc;--acc-g:rgba(74,122,255,.35);
            --txt:#edf0f7;--txt2:#97a0bc;--txt3:#586180;
            --red:#ff4757;--grn:#2ed573;--ylw:#ffa502;
            --brd:#252942;--r:12px;
        }
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);user-select:none;-webkit-user-select:none}
        button{font-family:inherit;cursor:pointer;border:none;outline:none}
        input,select,textarea{font-family:inherit;outline:none}
        .hidden{display:none!important}

        /* === SPLASH === */
        #splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s}
        #splash.fade{opacity:0;pointer-events:none}
        .sp-icon{width:90px;height:90px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff;margin:0 auto 16px;animation:spP 1.4s ease infinite}
        @keyframes spP{0%,100%{transform:scale(1);box-shadow:0 0 0 0 var(--acc-g)}50%{transform:scale(1.06);box-shadow:0 0 25px 8px var(--acc-g)}}
        .sp-t{text-align:center}
        .sp-t h1{font-size:36px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .sp-t p{color:var(--txt2);font-size:14px;margin-top:4px}
        .sp-bar{width:200px;height:3px;background:var(--bg3);border-radius:3px;margin:20px auto 8px;overflow:hidden}
        .sp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;animation:barM 1s ease infinite}
        @keyframes barM{0%{width:8%;margin-left:0}50%{width:45%;margin-left:30%}100%{width:8%;margin-left:92%}}
        #spMsg{font-size:11px;color:var(--txt3)}

        /* === APP LAYOUT === */
        #app{display:flex;flex-direction:column;height:100vh}

        /* HEADER */
        .hdr{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
        .hdr-logo{display:flex;align-items:center;gap:6px;font-size:18px;font-weight:800;letter-spacing:2px;flex-shrink:0}
        .hdr-logo i{font-size:20px;color:var(--acc)}
        .hdr-logo span{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .hdr-src{flex:1;max-width:360px;position:relative}
        .hdr-src input{width:100%;padding:7px 10px 7px 30px;background:var(--bg3);border:2px solid transparent;border-radius:8px;color:var(--txt);font-size:13px;transition:border-color .2s}
        .hdr-src input::placeholder{color:var(--txt3)}
        .hdr-src input:focus{border-color:var(--acc)}
        .hdr-src i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:12px}
        .hdr-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
        .hdr-clk{font-size:15px;font-weight:600;color:var(--txt2);font-variant-numeric:tabular-nums}
        .hdr-cnt{font-size:11px;color:var(--txt3);background:var(--bg3);padding:3px 8px;border-radius:16px}
        .btn-i{width:32px;height:32px;border-radius:50%;background:var(--bg3);color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s}
        .btn-i:hover,.btn-i.focused{background:var(--acc);color:#fff}

        /* CATEGORIES */
        .cats{height:44px;min-height:44px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;overflow-x:auto;overflow-y:hidden;padding:0 16px;gap:5px;scrollbar-width:none}
        .cats::-webkit-scrollbar{display:none}
        .cat{padding:5px 14px;background:0;border:2px solid transparent;border-radius:18px;color:var(--txt2);font-size:12px;font-weight:500;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:5px;flex-shrink:0}
        .cat i{font-size:11px}
        .cat:hover,.cat.foc{background:var(--bg3);color:var(--txt);border-color:var(--bg4)}
        .cat.act{background:var(--acc);color:#fff;border-color:var(--acc)}
        .cat.foc{border-color:var(--acc)!important;box-shadow:0 0 0 2px var(--acc-g)}

        /* GRID */
        .cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
        .cnt::-webkit-scrollbar{width:4px}
        .cnt::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
        .grd{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
        .crd{background:var(--bg2);border:2px solid var(--brd);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;transition:all .22s ease;position:relative;min-height:130px;justify-content:center}
        .crd:hover,.crd.foc{border-color:var(--acc);transform:scale(1.06);box-shadow:0 0 18px var(--acc-g),0 6px 20px rgba(0,0,0,.3);z-index:5}
        .crd.foc{animation:cG 1.4s ease infinite}
        @keyframes cG{0%,100%{box-shadow:0 0 12px var(--acc-g)}50%{box-shadow:0 0 28px var(--acc-g)}}
        .crd-n{position:absolute;top:5px;left:7px;font-size:9px;color:var(--txt3);background:var(--bg);padding:1px 5px;border-radius:5px;font-weight:600}
        .crd-f{position:absolute;top:5px;right:7px;color:var(--ylw);font-size:11px;display:none}
        .crd.fav .crd-f{display:block}
        .crd-img{width:48px;height:48px;border-radius:10px;object-fit:contain;background:var(--bg);padding:3px}
        .crd-ph{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
        .crd-nm{font-size:12px;font-weight:600;line-height:1.2;word-break:break-word}
        .crd-gr{font-size:9px;color:var(--txt3);background:var(--bg);padding:1px 7px;border-radius:8px}
        .no-d{text-align:center;padding:50px 20px;color:var(--txt3)}
        .no-d i{font-size:42px;margin-bottom:10px;display:block}
        .no-d h3{font-size:18px;color:var(--txt2);margin-bottom:3px}

        /* FOOTER */
        .ftr{height:36px;min-height:36px;background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:center;gap:16px;padding:0 16px}
        .ftr span{font-size:10px;color:var(--txt3);display:flex;align-items:center;gap:3px}
        .ftr kbd{background:var(--bg3);padding:1px 4px;border-radius:3px;font-size:9px;border:1px solid var(--bg4);font-family:inherit}

        /* === PLAYER === */
        #player{position:fixed;inset:0;background:#000;z-index:9000}
        #player video{width:100%;height:100%;object-fit:contain}
        #player video.cover{object-fit:cover}
        #player video.stretch{object-fit:fill}

        .pl{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10}
        .spn{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .pl span{color:var(--txt2);font-size:13px}

        .pe{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:11}
        .pe i{font-size:36px;color:var(--red)}
        .pe span{color:var(--txt2);font-size:15px;max-width:80%;text-align:center}
        .pe button{padding:9px 24px;background:var(--acc);color:#fff;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s}
        .pe button.foc{transform:scale(1.1);box-shadow:0 0 12px var(--acc-g)}

        .pc{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 22%,transparent 78%,rgba(0,0,0,.7) 100%);display:flex;flex-direction:column;justify-content:space-between;padding:16px 20px;z-index:5;transition:opacity .3s}
        .pc.hid{opacity:0;pointer-events:none}
        .pc-t{display:flex;justify-content:space-between;align-items:flex-start}
        .pc-now{display:flex;align-items:center;gap:12px}
        .pc-now img{width:40px;height:40px;border-radius:8px;object-fit:contain;background:rgba(255,255,255,.1);padding:2px}
        .pc-now h2{font-size:20px;font-weight:700}
        .pc-now small{color:var(--txt2);font-size:12px}
        .pc-clk{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums}

        .pc-b{display:flex;justify-content:center;gap:8px}
        .pb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 15px;background:rgba(255,255,255,.1);backdrop-filter:blur(6px);border:2px solid transparent;border-radius:10px;color:#fff;font-size:10px;transition:all .2s;min-width:62px}
        .pb i{font-size:18px}
        .pb:hover,.pb.foc{background:var(--acc);border-color:var(--acc);transform:scale(1.1);box-shadow:0 0 12px var(--acc-g)}

        /* OSDs */
        .osd-ch{position:absolute;top:24px;right:24px;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);padding:14px 22px;border-radius:12px;border:1px solid var(--brd);text-align:center;z-index:20}
        .osd-ch-n{font-size:36px;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums}
        .osd-ch-nm{font-size:13px;color:var(--txt2);margin-top:2px}

        .osd-v{position:absolute;left:24px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.8);backdrop-filter:blur(8px);padding:12px;border-radius:10px;border:1px solid var(--brd);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:20}
        .osd-v i{font-size:18px;color:var(--acc)}
        .vb{width:5px;height:90px;background:var(--bg3);border-radius:3px;position:relative;overflow:hidden}
        .vf{position:absolute;bottom:0;width:100%;background:var(--acc);border-radius:3px;transition:height .1s}
        .osd-v span{font-size:11px;font-weight:600}

        .osd-t{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);backdrop-filter:blur(8px);padding:8px 18px;border-radius:8px;border:1px solid var(--brd);font-size:15px;font-weight:600;z-index:20;white-space:nowrap}

        /* MINI LIST */
        .ml{position:absolute;right:0;top:0;bottom:0;width:280px;background:rgba(12,14,20,.95);backdrop-filter:blur(8px);z-index:15;display:flex;flex-direction:column;border-left:1px solid var(--brd)}
        .ml h3{padding:12px 14px;font-size:14px;border-bottom:1px solid var(--brd)}
        .ml-items{flex:1;overflow-y:auto;padding:4px}
        .mi{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .2s;border:2px solid transparent}
        .mi:hover,.mi.foc{background:var(--bg3);border-color:var(--acc)}
        .mi.act{background:var(--acc)}
        .mi img{width:26px;height:26px;border-radius:5px;object-fit:contain;background:var(--bg2)}
        .mi-nm{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .mi-n{font-size:10px;color:var(--txt3)}

        /* === ADMIN === */
        .adm-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px}
        .adm-box{background:var(--bg2);border-radius:14px;width:100%;max-width:860px;max-height:85vh;display:flex;flex-direction:column;border:1px solid var(--brd);overflow:hidden}
        .adm-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--brd);background:var(--bg)}
        .adm-hd h2{font-size:16px;display:flex;align-items:center;gap:7px}
        .adm-hd h2 i{color:var(--acc)}
        .adm-cl{width:28px;height:28px;border-radius:50%;background:var(--bg3);color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:12px}
        .adm-cl:hover{background:var(--red);color:#fff}
        .adm-bd{display:flex;flex:1;overflow:hidden}
        .adm-nv{width:160px;min-width:160px;background:var(--bg);border-right:1px solid var(--brd);padding:8px 4px;display:flex;flex-direction:column;gap:2px}
        .adm-nv button{display:flex;align-items:center;gap:7px;padding:8px 12px;background:0;color:var(--txt2);font-size:12px;border-radius:7px;transition:all .2s;text-align:left;width:100%}
        .adm-nv button i{width:14px;text-align:center;font-size:12px}
        .adm-nv button:hover{background:var(--bg3);color:var(--txt)}
        .adm-nv button.act{background:var(--acc);color:#fff}
        .adm-ct{flex:1;overflow-y:auto;padding:16px}
        .adm-s{display:none}.adm-s.act{display:block}
        .adm-s h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
        .adm-s h3 i{color:var(--acc)}
        .sts{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:16px}
        .st{background:var(--bg);padding:14px;border-radius:10px;border:1px solid var(--brd)}
        .st-v{font-size:24px;font-weight:700}
        .st-l{font-size:11px;color:var(--txt3);margin-top:2px}
        .fg{margin-bottom:12px}
        .fg label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500}
        .fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;background:var(--bg);border:2px solid var(--brd);border-radius:7px;color:var(--txt);font-size:13px;transition:border-color .2s}
        .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
        .fg textarea{height:70px;resize:vertical}
        .btn{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
        .btn-p{background:var(--acc);color:#fff}.btn-p:hover{filter:brightness(1.15)}
        .btn-s{background:var(--grn);color:#fff}
        .btn-d{background:var(--red);color:#fff}
        .alr{padding:8px 14px;border-radius:7px;margin:10px 0;font-size:12px;display:flex;align-items:center;gap:7px}
        .alr-i{background:rgba(74,122,255,.1);border:1px solid rgba(74,122,255,.2);color:var(--acc)}

        @media(max-width:600px){
            .grd{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px}
            .hdr-src{max-width:180px}
            .ftr span{font-size:8px}
            .ml{width:220px}
            .adm-nv{width:120px;min-width:120px}
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="sp-t">
        <div class="sp-icon"><i class="fas fa-tv"></i></div>
        <h1>TİVİM</h1>
        <p>Canlı TV İzleme Platformu</p>
        <div class="sp-bar"><div class="sp-fill"></div></div>
        <span id="spMsg">Başlatılıyor...</span>
    </div>
</div>

<div id="app" class="hidden">
    <div class="hdr">
        <div class="hdr-logo"><i class="fas fa-tv"></i><span>TİVİM</span></div>
        <div class="hdr-src"><i class="fas fa-search"></i><input type="text" id="srcIn" placeholder="Kanal ara..."></div>
        <div class="hdr-r">
            <span class="hdr-clk" id="clk">--:--</span>
            <span class="hdr-cnt" id="chCnt">0</span>
            <button class="btn-i" id="btnAdm" title="Admin"><i class="fas fa-cog"></i></button>
        </div>
    </div>
    <div class="cats" id="catBar">
        <button class="cat act" data-c="all"><i class="fas fa-globe"></i> Tümü</button>
        <button class="cat" data-c="favs"><i class="fas fa-star"></i> Favoriler</button>
        <button class="cat" data-c="recent"><i class="fas fa-history"></i> Son İzlenen</button>
    </div>
    <div class="cnt" id="cnt">
        <div class="grd" id="grd"></div>
        <div class="no-d hidden" id="noD"><i class="fas fa-satellite-dish"></i><h3>Kanal bulunamadı</h3><p>Farklı bir arama deneyin</p></div>
    </div>
    <div class="ftr">
        <span><kbd>▲▼◄►</kbd> Gezin</span>
        <span><kbd>OK</kbd> İzle</span>
        <span><kbd>CH±</kbd> Kanal</span>
        <span><kbd>VOL</kbd> Ses</span>
        <span><kbd>↩</kbd> Geri</span>
    </div>
</div>

<div id="player" class="hidden">
    <video id="vid" autoplay playsinline></video>
    <div class="pl" id="pL"><div class="spn"></div><span>Yükleniyor...</span></div>
    <div class="pe hidden" id="pE"><i class="fas fa-exclamation-triangle"></i><span id="pEM">Yayın açılamadı</span><button id="btnRt">Tekrar Dene</button></div>
    <div class="pc" id="pC">
        <div class="pc-t">
            <div class="pc-now"><img id="pLg" src="" style="display:none"><div><h2 id="pNm">-</h2><small id="pCt">-</small></div></div>
            <span class="pc-clk" id="pClk">--:--</span>
        </div>
        <div class="pc-b">
            <button class="pb" id="bPrv"><i class="fas fa-backward-step"></i>Önceki</button>
            <button class="pb" id="bPP"><i class="fas fa-pause"></i>Duraklat</button>
            <button class="pb" id="bNxt"><i class="fas fa-forward-step"></i>Sonraki</button>
            <button class="pb" id="bFav"><i class="far fa-star"></i>Favori</button>
            <button class="pb" id="bRat"><i class="fas fa-expand"></i>Ekran</button>
            <button class="pb" id="bStp"><i class="fas fa-stop"></i>Kapat</button>
        </div>
    </div>
    <div class="osd-ch hidden" id="osdCh"><div class="osd-ch-n" id="osdN"></div><div class="osd-ch-nm" id="osdNm"></div></div>
    <div class="osd-v hidden" id="osdV"><i class="fas fa-volume-up" id="vIc"></i><div class="vb"><div class="vf" id="vFl" style="height:100%"></div></div><span id="vTx">100%</span></div>
    <div class="osd-t hidden" id="osdT"></div>
    <div class="ml hidden" id="mL"><h3><i class="fas fa-list"></i> Kanallar</h3><div class="ml-items" id="mLi"></div></div>
</div>

<script>
/* ===================================================================
   STORAGE
   =================================================================== */
const S={
    p:'tv_',
    g(k,d=null){try{const v=localStorage.getItem(this.p+k);return v?JSON.parse(v):d}catch(e){return d}},
    s(k,v){try{localStorage.setItem(this.p+k,JSON.stringify(v))}catch(e){}},
    d(k){localStorage.removeItem(this.p+k)},
    favs(){return this.g('f',[])},
    tFav(id){let f=this.favs();const i=f.indexOf(id);if(i>-1)f.splice(i,1);else f.push(id);this.s('f',f);return i===-1},
    isFav(id){return this.favs().includes(id)},
    rec(){return this.g('r',[])},
    aRec(id){let r=this.rec().filter(x=>x!==id);r.unshift(id);this.s('r',r.slice(0,50))},
    cf(){return this.g('c',{url:'https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/merged.m3u',pass:'admin123',vol:100,interval:3600000,lastUp:null})},
    sCf(c){this.s('c',{...this.cf(),...c})},
    ca(){return this.g('cache',null)},
    sCa(d){this.s('cache',{d:d,t:Date.now()})},
    clr(){Object.keys(localStorage).filter(k=>k.startsWith(this.p)).forEach(k=>localStorage.removeItem(k))}
};

/* ===================================================================
   M3U PARSER  - Header & URL desteği ile
   =================================================================== */
function parseM3U(text){
    const ls=text.split('\n').map(l=>l.trim()).filter(l=>l);
    const chs=[];
    let info=null,extraHeaders={},kodiProps={};

    for(let i=0;i<ls.length;i++){
        const L=ls[i];

        if(L.startsWith('#EXTINF:')){
            info={};extraHeaders={};kodiProps={};
            const m=t=>{const r=L.match(new RegExp(t+'="([^"]*)"','i'));return r?r[1]:''};
            info.logo=m('tvg-logo');
            info.group=m('group-title')||'Diğer';
            info.tvgId=m('tvg-id');
            info.tvgName=m('tvg-name');

            // http-referrer / http-user-agent in EXTINF
            const ref=m('http-referrer')||m('http-referer');
            if(ref) extraHeaders['Referer']=ref;
            const ua=m('http-user-agent');
            if(ua) extraHeaders['User-Agent']=ua;

            const nm=L.match(/,\s*(.+)$/);
            info.name=nm?nm[1].trim():'Kanal '+(chs.length+1);
        }
        else if(L.startsWith('#EXTVLCOPT:')){
            // #EXTVLCOPT:http-referrer=xxx
            const m=L.match(/#EXTVLCOPT:(.+?)=(.+)/i);
            if(m){
                const k=m[1].trim().toLowerCase(),v=m[2].trim();
                if(k.includes('referrer')||k.includes('referer')) extraHeaders['Referer']=v;
                else if(k.includes('user-agent')) extraHeaders['User-Agent']=v;
                else if(k.includes('origin')) extraHeaders['Origin']=v;
            }
        }
        else if(L.startsWith('#KODIPROP:')){
            // #KODIPROP:inputstream.adaptive.stream_headers=Referer=xxx
            const m=L.match(/#KODIPROP:(.+?)=(.+)/i);
            if(m){
                const k=m[1].trim().toLowerCase(),v=m[2].trim();
                if(k.includes('stream_headers')){
                    // Parse "key=value&key2=value2"
                    v.split('&').forEach(p=>{
                        const [hk,...hv]=p.split('=');
                        if(hk&&hv.length) extraHeaders[hk.trim()]=hv.join('=').trim();
                    });
                }
                if(k.includes('license_key')) kodiProps.licenseKey=v;
            }
        }
        else if(!L.startsWith('#')&&info){
            let url=L;

            // URL'de headers parametresi var mı? (base64 encoded)
            let urlHeaders={...extraHeaders};
            try{
                const u=new URL(url);
                const hParam=u.searchParams.get('headers');
                if(hParam){
                    try{
                        const decoded=JSON.parse(atob(hParam));
                        Object.assign(urlHeaders,decoded);
                    }catch(e2){
                        try{
                            const decoded=JSON.parse(decodeURIComponent(hParam));
                            Object.assign(urlHeaders,decoded);
                        }catch(e3){
                            try{ Object.assign(urlHeaders,JSON.parse(hParam)); }catch(e4){}
                        }
                    }
                }
            }catch(e){}

            let type='hls';
            const ul=url.toLowerCase();
            if(ul.includes('.mpd'))type='dash';
            else if(ul.includes('.flv'))type='flv';
            else if(ul.includes('.mp4')&&!ul.includes('.m3u'))type='mp4';

            chs.push({
                id:(info.name||'c').toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,25)+'_'+chs.length,
                num:chs.length+1,
                name:info.name,url,type,
                logo:info.logo,group:info.group,
                tvgId:info.tvgId,
                headers:urlHeaders,
                kodiProps
            });
            info=null;extraHeaders={};kodiProps={};
        }
    }
    return chs;
}

async function fetchM3U(url){
    const px=[
        url,
        'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
        'https://corsproxy.io/?'+encodeURIComponent(url),
        'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(url)
    ];
    for(const p of px){
        try{
            const r=await fetch(p,{headers:{'Accept':'*/*'}});
            if(r.ok){const t=await r.text();if(t.length>20)return t;}
        }catch(e){continue}
    }
    throw new Error('M3U indirilemedi');
}

function catIcon(g){
    const c=g.toLowerCase();
    const m={haber:'fa-newspaper',news:'fa-newspaper',spor:'fa-futbol',sport:'fa-futbol',sports:'fa-futbol',sinema:'fa-film',film:'fa-film',movie:'fa-film',dizi:'fa-tv',series:'fa-tv',müzik:'fa-music',music:'fa-music',çocuk:'fa-child',kids:'fa-child',belgesel:'fa-earth-americas',documentary:'fa-earth-americas',eğlence:'fa-masks-theater',entertainment:'fa-masks-theater',din:'fa-mosque',radyo:'fa-radio',radio:'fa-radio',ulusal:'fa-flag',national:'fa-flag',tr:'fa-flag','türk':'fa-flag'};
    for(const[k,v]of Object.entries(m))if(c.includes(k))return v;
    return'fa-layer-group';
}

function getCats(chs){
    const m=new Map();
    chs.forEach(c=>{if(!m.has(c.group))m.set(c.group,{name:c.group,cnt:0,icon:catIcon(c.group)});m.get(c.group).cnt++});
    return[...m.values()].sort((a,b)=>b.cnt-a.cnt);
}

   VIDEO PLAYER - Gelişmiş header desteği
   =================================================================== */
const V={
    el:null,hls:null,ch:null,playing:false,
    vol:100,asp:0,asps:['','cover','stretch'],
    retry:0,maxR:4,rT:null,
    cT:null,cVis:true,

    init(){
        this.el=$('vid');
        this.vol=S.cf().vol||100;
        this.el.volume=this.vol/100;
        this.el.addEventListener('playing',()=>this.onPlay());
        this.el.addEventListener('waiting',()=>this.onBuf());
        this.el.addEventListener('error',()=>this.onFail());
        this.el.addEventListener('pause',()=>{
            $('bPP').querySelector('i').className='fas fa-play';
            $('bPP').lastChild.textContent='Oynat';
        });
    },

    async play(ch){
        this.ch=ch;this.retry=0;
        this.kill();
        this.showL(true);this.showE(false);
        this.updUI(ch);
        S.aRec(ch.id);
        console.log('▶️',ch.name,'|',ch.type,'|',ch.url);
        if(Object.keys(ch.headers||{}).length)console.log('📋 Headers:',ch.headers);
        try{await this.load(ch)}catch(e){console.error('Play fail:',e);this.fail()}
    },

    async load(ch){
        const url=ch.url;
        const headers=ch.headers||{};
        const hasHeaders=Object.keys(headers).length>0;

        // Her zaman önce HLS dene
        if(Hls.isSupported()){
            return new Promise((ok,no)=>{
                const cfg={
                    maxBufferLength:30,
                    maxMaxBufferLength:600,
                    maxBufferSize:60*1000*1000,
                    maxBufferHole:0.5,
                    enableWorker:true,
                    lowLatencyMode:false,
                    startLevel:-1,
                    fragLoadingMaxRetry:8,
                    manifestLoadingMaxRetry:6,
                    levelLoadingMaxRetry:6,
                    fragLoadingRetryDelay:1000,
                    manifestLoadingRetryDelay:1000,
                    xhrSetup:(xhr,xhrUrl)=>{
                        // Custom headers ekle
                        if(headers['Referer']){
                            try{xhr.setRequestHeader('Referer',headers['Referer'])}catch(e){}
                        }
                        if(headers['Origin']){
                            try{xhr.setRequestHeader('Origin',headers['Origin'])}catch(e){}
                        }
                        if(headers['User-Agent']){
                            try{xhr.setRequestHeader('User-Agent',headers['User-Agent'])}catch(e){}
                        }
                        // Diğer tüm headerlar
                        Object.entries(headers).forEach(([k,v])=>{
                            if(!['Referer','Origin','User-Agent'].includes(k)){
                                try{xhr.setRequestHeader(k,v)}catch(e){}
                            }
                        });
                    }
                };

                const h=new Hls(cfg);

                h.loadSource(url);
                h.attachMedia(this.el);

                let resolved=false;

                h.on(Hls.Events.MANIFEST_PARSED,(ev,data)=>{
                    console.log('✅ HLS manifest parsed, levels:',data.levels.length);
                    this.el.play().then(()=>{resolved=true;ok()}).catch(e=>{
                        // Autoplay blocked - try muted
                        this.el.muted=true;
                        this.el.play().then(()=>{resolved=true;ok()}).catch(no);
                    });
                });

                h.on(Hls.Events.ERROR,(ev,data)=>{
                    console.warn('HLS Error:',data.type,data.details,data.fatal);
                    if(data.fatal){
                        switch(data.type){
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                if(this.retry<2){h.startLoad();this.retry++;return;}
                                h.destroy();
                                if(!resolved)no(new Error('network'));
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                h.recoverMediaError();
                                break;
                            default:
                                h.destroy();
                                if(!resolved)no(new Error(data.details));
                                break;
                        }
                    }
                });

                this.hls=h;

                // Timeout - 20 saniye sonra hala yüklenmediyse
                setTimeout(()=>{
                    if(!resolved){
                        console.warn('HLS timeout');
                        h.destroy();
                        this.hls=null;
                        no(new Error('timeout'));
                    }
                },20000);
            });
        }

        // Native HLS (Safari)
        if(this.el.canPlayType('application/vnd.apple.mpegurl')){
            return new Promise((ok,no)=>{
                this.el.src=url;
                this.el.addEventListener('loadedmetadata',()=>this.el.play().then(ok).catch(no),{once:true});
                this.el.addEventListener('error',()=>no(new Error('native hls fail')),{once:true});
            });
        }

        // Direct
        return this.loadDirect(url);
    },

    loadDirect(url){
        return new Promise((ok,no)=>{
            this.el.src=url;
            this.el.addEventListener('canplay',()=>this.el.play().then(ok).catch(no),{once:true});
            this.el.addEventListener('error',()=>no(new Error('direct fail')),{once:true});
            this.el.load();
        });
    },

    kill(){
        if(this.hls){this.hls.destroy();this.hls=null}
        this.el.removeAttribute('src');
        this.el.load();
        clearTimeout(this.rT);
    },

    stop(){this.kill();this.ch=null;this.playing=false},
    tPP(){this.el.paused?this.el.play():this.el.pause()},

    sVol(v){
        this.vol=Math.max(0,Math.min(100,v));
        this.el.volume=this.vol/100;
        this.el.muted=this.vol===0;
        S.sCf({vol:this.vol});
        this.showVol();
    },
    vUp(){this.sVol(this.vol+5)},
    vDn(){this.sVol(this.vol-5)},
    tMute(){this.el.muted=!this.el.muted;this.showVol()},

    cyAsp(){
        this.asp=(this.asp+1)%this.asps.length;
        this.el.className=this.asps[this.asp];
        this.showTxt('Ekran: '+['Sığdır','Doldur','Ger'][this.asp]);
    },

    showL(b){$('pL').classList.toggle('hidden',!b)},
    showE(b,msg){$('pE').classList.toggle('hidden',!b);if(msg)$('pEM').textContent=msg;if(b)this.showL(false)},

    updUI(ch){
        $('pNm').textContent=ch.name;
        $('pCt').textContent=ch.group;
        const lg=$('pLg');
        if(ch.logo){lg.src=ch.logo;lg.style.display='block';lg.onerror=()=>lg.style.display='none'}
        else lg.style.display='none';
        this.updFav();
    },

    updFav(){
        if(!this.ch)return;
        const f=S.isFav(this.ch.id);
        const b=$('bFav');
        b.querySelector('i').className=f?'fas fa-star':'far fa-star';
        b.style.color=f?'var(--ylw)':'#fff';
    },

    showVol(){
        const e=$('osdV');
        $('vFl').style.height=this.vol+'%';
        $('vTx').textContent=(this.el.muted?0:this.vol)+'%';
        $('vIc').className=this.el.muted||this.vol===0?'fas fa-volume-mute':this.vol<50?'fas fa-volume-down':'fas fa-volume-up';
        e.classList.remove('hidden');
        clearTimeout(this._vt);
        this._vt=setTimeout(()=>e.classList.add('hidden'),2000);
    },

    showTxt(m){
        const e=$('osdT');e.textContent=m;e.classList.remove('hidden');
        clearTimeout(this._tt);this._tt=setTimeout(()=>e.classList.add('hidden'),2000);
    },

    showC(){
        $('pC').classList.remove('hid');this.cVis=true;
        clearTimeout(this.cT);
        this.cT=setTimeout(()=>{if(this.playing){$('pC').classList.add('hid');this.cVis=false}},5000);
    },
    hideC(){$('pC').classList.add('hid');this.cVis=false},

    onPlay(){
        this.playing=true;this.showL(false);this.showE(false);this.retry=0;
        $('bPP').querySelector('i').className='fas fa-pause';
        $('bPP').lastChild.textContent='Duraklat';
        this.showC();
    },
    onBuf(){this.showL(true)},
    onFail(){this.fail()},

    fail(){
        if(this.retry<this.maxR&&this.ch){
            this.retry++;
            console.log('🔄 Retry',this.retry+'/'+this.maxR);
            this.showL(true);
            this.rT=setTimeout(()=>{
                this.kill();
                // Son denemede direct dene
                const p = this.retry>=this.maxR-1 ? this.loadDirect(this.ch.url) : this.load(this.ch);
                p.catch(()=>this.fail());
            },2000*this.retry);
        }else{
            this.showE(true,'Yayın açılamadı. Kanal aktif olmayabilir.');
        }
    },

    retr(){if(this.ch){this.retry=0;this.play(this.ch)}}
};

        const ov=document.createElement('div');ov.className='adm-ov';
        ov.innerHTML=`<div class="adm-box"><div class="adm-hd"><h2><i class="fas fa-cog"></i> Admin Panel</h2><button class="adm-cl" onclick="A.closeAdm()"><i class="fas fa-times"></i></button></div><div class="adm-bd"><div class="adm-nv"><button class="act" onclick="admS('dash',this)"><i class="fas fa-tachometer-alt"></i> Dashboard</button><button onclick="admS('pl',this)"><i class="fas fa-list"></i> Playlist</button><button onclick="admS('ch',this)"><i class="fas fa-tv"></i> Kanallar</button><button onclick="admS('set',this)"><i class="fas fa-sliders-h"></i> Ayarlar</button><button onclick="admS('bk',this)"><i class="fas fa-database"></i> Yedekleme</button></div><div class="adm-ct"><div class="adm-s act" id="a-dash"><h3><i class="fas fa-tachometer-alt"></i> Dashboard</h3><div class="sts"><div class="st"><div class="st-v" style="color:var(--acc)">${this.chs.length}</div><div class="st-l">Toplam Kanal</div></div><div class="st"><div class="st-v" style="color:var(--grn)">${cats.length}</div><div class="st-l">Kategori</div></div><div class="st"><div class="st-v" style="color:var(--ylw)">${S.favs().length}</div><div class="st-l">Favori</div></div><div class="st"><div class="st-v" style="color:var(--acc2)">${S.rec().length}</div><div class="st-l">Son İzlenen</div></div></div><h3>Kategoriler</h3><div style="margin-top:6px;max-height:260px;overflow-y:auto">${cats.map(c=>`<div style="display:flex;justify-content:space-between;padding:5px 10px;border-bottom:1px solid var(--brd);font-size:12px"><span><i class="fas ${c.icon}" style="color:var(--acc);width:16px;margin-right:5px"></i>${c.name}</span><span style="color:var(--txt3)">${c.cnt}</span></div>`).join('')}</div></div><div class="adm-s" id="a-pl"><h3><i class="fas fa-list"></i> Playlist</h3><div class="fg"><label>M3U URL</label><input id="aUrl" value="${cf.url}"></div><div class="fg"><label>Güncelleme Aralığı</label><select id="aInt"><option value="1800000" ${cf.interval==1800000?'selected':''}>30 dk</option><option value="3600000" ${cf.interval==3600000?'selected':''}>1 saat</option><option value="21600000" ${cf.interval==21600000?'selected':''}>6 saat</option><option value="86400000" ${cf.interval==86400000?'selected':''}>24 saat</option></select></div><div style="display:flex;gap:6px"><button class="btn btn-p" onclick="S.sCf({url:$('aUrl').value,interval:+$('aInt').value});alert('Kaydedildi!')"><i class="fas fa-save"></i> Kaydet</button><button class="btn btn-s" onclick="S.d('cache');alert('Sayfa yenilenecek');location.reload()"><i class="fas fa-sync-alt"></i> Güncelle</button></div><div class="alr alr-i" style="margin-top:10px"><i class="fas fa-info-circle"></i>Son güncelleme: ${cf.lastUp?new Date(cf.lastUp).toLocaleString('tr-TR'):'Hiç'}</div><h3 style="margin-top:16px"><i class="fas fa-plus-circle"></i> Manuel Kanal</h3><div class="fg"><label>Kanal Adı</label><input id="mNm" placeholder="Ad"></div><div class="fg"><label>URL</label><input id="mUr" placeholder="http://..."></div><div class="fg"><label>Kategori</label><input id="mGr" value="Özel"></div><div class="fg"><label>Logo</label><input id="mLo" placeholder="https://..."></div><div class="fg"><label>Referer Header (opsiyonel)</label><input id="mRef" placeholder="https://example.com/"></div><button class="btn btn-p" onclick="A.addCh()"><i class="fas fa-plus"></i> Ekle</button></div><div class="adm-s" id="a-ch"><h3><i class="fas fa-tv"></i> Kanallar (${this.chs.length})</h3><div class="fg"><input id="aSrc" placeholder="Ara..." oninput="A.fltAdm(this.value)"></div><div style="max-height:350px;overflow-y:auto" id="aChL"></div></div><div class="adm-s" id="a-set"><h3><i class="fas fa-sliders-h"></i> Ayarlar</h3><div class="fg"><label>Admin Şifresi</label><input id="aPas" value="${cf.pass}"></div><div class="fg"><label>Varsayılan Ses: <b id="aVoV">${cf.vol}%</b></label><input type="range" id="aVol" min="0" max="100" value="${cf.vol}" style="width:100%" oninput="$('aVoV').textContent=this.value+'%'"></div><button class="btn btn-p" onclick="S.sCf({pass:$('aPas').value,vol:+$('aVol').value});alert('Kaydedildi!')"><i class="fas fa-save"></i> Kaydet</button></div><div class="adm-s" id="a-bk"><h3><i class="fas fa-database"></i> Yedekleme</h3><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"><button class="btn btn-p" onclick="A.exp()"><i class="fas fa-download"></i> Dışa Aktar</button><button class="btn btn-d" onclick="S.d('cache');alert('Cache temizlendi!')"><i class="fas fa-broom"></i> Cache Temizle</button><button class="btn btn-d" onclick="if(confirm('TÜM veriler silinecek!')){S.clr();location.reload()}"><i class="fas fa-trash"></i> Sıfırla</button></div><div class="alr alr-i"><i class="fas fa-info-circle"></i>Depolama: ~${(JSON.stringify(localStorage).length/1024).toFixed(1)} KB</div></div></div></div></div>`;
        document.body.appendChild(ov);
        this.fillAdm(this.chs.slice(0,150));
    },

    fillAdm(list){
        const el=$('aChL');if(!el)return;
        el.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:12px">${list.map(c=>`<tr style="border-bottom:1px solid var(--brd)"><td style="padding:5px 8px;color:var(--txt3)">${c.num}</td><td style="padding:5px">${c.logo?`<img src="${c.logo}" style="width:22px;height:22px;border-radius:3px;object-fit:contain;vertical-align:middle" onerror="this.style.display='none'">`:'—'}</td><td style="padding:5px">${c.name}</td><td style="padding:5px;color:var(--txt3)">${c.group}</td><td style="padding:5px;color:var(--txt3)">${c.type}</td><td style="padding:5px;color:var(--txt3)">${Object.keys(c.headers||{}).length?'🔒':''}</td></tr>`).join('')}</table>`;
    },
    fltAdm(q){q=q.toLowerCase();this.fillAdm(this.chs.filter(c=>c.name.toLowerCase().includes(q)||c.group.toLowerCase().includes(q)).slice(0,150))},

    addCh(){
        const n=$('mNm').value.trim(),u=$('mUr').value.trim();
        if(!n||!u){alert('Ad ve URL gerekli!');return}
        const headers={};
        const ref=$('mRef').value.trim();
        if(ref)headers['Referer']=ref;

        const ch={id:n.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now(),num:this.chs.length+1,name:n,url:u,group:$('mGr').value.trim()||'Özel',logo:$('mLo').value.trim(),type:'hls',headers};
        this.chs.push(ch);S.sCa(this.chs);
        this.cats=getCats(this.chs);this.renderCats();this.filter(this.curC);
        $('mNm').value='';$('mUr').value='';$('mLo').value='';$('mRef').value='';
        alert('"'+n+'" eklendi!');
    },

    exp(){
        const d={};Object.keys(localStorage).filter(k=>k.startsWith('tv_')).forEach(k=>d[k.replace('tv_','')]=JSON.parse(localStorage.getItem(k)));
        const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tivim_backup.json';a.click();
    },

    clk(){
        const u=()=>{const t=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});$('clk').textContent=t;$('pClk').textContent=t};
        u();setInterval(u,1000);
    },

    // ====== NAVIGATION ======
    focCard(i){
        const cards=document.querySelectorAll('#grd .crd');
        cards.forEach(c=>c.classList.remove('foc'));
        if(i<0||i>=cards.length)return;
        this._fi=i;cards[i].classList.add('foc');
        cards[i].scrollIntoView({behavior:'smooth',block:'nearest'});
        this.area='grid';
    },

    focCat(dir){
        const bs=[...document.querySelectorAll('.cat')];
        let fi=bs.findIndex(b=>b.classList.contains('foc'));
        bs.forEach(b=>b.classList.remove('foc'));
        if(dir==='r')fi=Math.min(bs.length-1,fi+1);else fi=Math.max(0,fi-1);
        if(fi<0)fi=0;
        bs[fi].classList.add('foc');bs[fi].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
        this.area='cats';
    },

    actCat(){
        const b=document.querySelector('.cat.foc');
        if(b){this.filter(b.dataset.c);setTimeout(()=>this.focCard(0),50)}
    },

    navG(d){
        const cards=document.querySelectorAll('#grd .crd');
        if(!cards.length)return;
        const cols=Math.max(1,Math.round($('grd').clientWidth/(cards[0].offsetWidth+10)));
        let fi=this._fi;if(fi<0)fi=0;
        switch(d){
            case'u':if(fi<cols){this.toCats();return}fi-=cols;break;
            case'd':fi=Math.min(cards.length-1,fi+cols);break;
            case'l':fi=Math.max(0,fi-1);break;
            case'r':fi=Math.min(cards.length-1,fi+1);break;
        }
        this.focCard(fi);
    },

    toCats(){
        document.querySelectorAll('#grd .crd').forEach(c=>c.classList.remove('foc'));
        const a=document.querySelector('.cat.act')||document.querySelector('.cat');
        if(a){document.querySelectorAll('.cat').forEach(b=>b.classList.remove('foc'));a.classList.add('foc');this.area='cats'}
    },

    navP(d){
        const bs=[...$('pC').querySelectorAll('.pb')];
        let fi=bs.findIndex(b=>b.classList.contains('foc'));
        bs.forEach(b=>b.classList.remove('foc'));
        if(d==='l')fi=Math.max(0,fi-1);else if(d==='r')fi=Math.min(bs.length-1,fi+1);
        if(fi<0)fi=0;
        bs[fi].classList.add('foc');
    },

    actP(){const b=document.querySelector('.pb.foc');if(b)b.click()},

    navM(d){
        const its=[...document.querySelectorAll('.mi')];if(!its.length)return;
        let fi=its.findIndex(i=>i.classList.contains('foc'));
        its.forEach(i=>i.classList.remove('foc'));
        if(d==='u')fi=Math.max(0,fi-1);else if(d==='d')fi=Math.min(its.length-1,fi+1);else if(d==='l'){this.tMini();return}
        if(fi<0)fi=0;
        its[fi].classList.add('foc');its[fi].scrollIntoView({behavior:'smooth',block:'nearest'});
    },

    actM(){const it=document.querySelector('.mi.foc');if(it){this.playCh(it.dataset.id);this.tMini()}},

    // ====== EVENTS ======
    bind(){
        let st;
        $('srcIn').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>this.search(e.target.value),300)});
        $('catBar').addEventListener('click',e=>{const b=e.target.closest('.cat');if(b){this.filter(b.dataset.c);setTimeout(()=>this.focCard(0),50)}});
        $('grd').addEventListener('click',e=>{const c=e.target.closest('.crd');if(c)this.playCh(c.dataset.id)});
        $('btnAdm').addEventListener('click',()=>this.openAdm());
        $('bPP').addEventListener('click',()=>V.tPP());
        $('bNxt').addEventListener('click',()=>this.nextCh());
        $('bPrv').addEventListener('click',()=>this.prevCh());
        $('bFav').addEventListener('click',()=>this.tFav());
        $('bRat').addEventListener('click',()=>V.cyAsp());
        $('bStp').addEventListener('click',()=>this.closeP());
        $('btnRt').addEventListener('click',()=>V.retr());
        $('vid').addEventListener('click',()=>{V.cVis?V.hideC():V.showC()});
        $('mLi').addEventListener('click',e=>{const it=e.target.closest('.mi');if(it){this.playCh(it.dataset.id);this.tMini()}});
    },

    // ====== REMOTE CONTROL ======
    _nb:'',_nt:null,

    bindRC(){
        document.addEventListener('keydown',e=>{
            const k=e.keyCode;
            // Input focus
            if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='SELECT'){
                if(k===27||k===4){document.activeElement.blur();e.preventDefault();return}
                if(k===13&&document.activeElement.id==='srcIn'){this.search(document.activeElement.value);document.activeElement.blur();e.preventDefault()}
                return;
            }
            e.preventDefault();

            const pv=this.pVis(),mo=!$('mL').classList.contains('hidden'),ao=!!document.querySelector('.adm-ov');

            // BACK
            if([27,4,8,461].includes(k)){
                if(ao){this.closeAdm();return}
                if(mo){this.tMini();return}
                if(pv){V.cVis?V.hideC():this.closeP();return}
                if($('srcIn').value){$('srcIn').value='';this.search('');return}
                return;
            }
            if(ao)return;

            // ARROWS
            if([38,19].includes(k)){
                if(mo)this.navM('u');
                else if(pv&&!V.cVis){V.showC();this.area='player'}
                else if(pv){}
                else if(this.area==='cats'){}
                else this.navG('u');
            }
            else if([40,20].includes(k)){
                if(mo)this.navM('d');
                else if(pv&&!V.cVis){V.showC();this.area='player'}
                else if(pv){}
                else if(this.area==='cats')this.focCard(0);
                else this.navG('d');
            }
            else if([37,21].includes(k)){
                if(mo)this.navM('l');
                else if(pv&&V.cVis)this.navP('l');
                else if(pv&&!V.cVis){V.showC();this.area='player'}
                else if(this.area==='cats')this.focCat('l');
                else this.navG('l');
            }
            else if([39,22].includes(k)){
                if(mo){}
                else if(pv&&V.cVis)this.navP('r');
                else if(pv&&!V.cVis){V.showC();this.area='player'}
                else if(this.area==='cats')this.focCat('r');
                else this.navG('r');
            }
            // OK
            else if([13,23,66].includes(k)){
                if(mo)this.actM();
                else if(pv&&V.cVis)this.actP();
                else if(pv&&!V.cVis){V.showC();this.area='player'}
                else if(this.area==='cats')this.actCat();
                else{const fc=document.querySelector('.crd.foc');if(fc)this.playCh(fc.dataset.id)}
            }
            // VOL
            else if([175,24].includes(k))V.vUp();
            else if([174,25].includes(k))V.vDn();
            else if([173,164].includes(k))V.tMute();
            // CH
            else if([33,166].includes(k)){if(pv)this.nextCh()}
            else if([34,167].includes(k)){if(pv)this.prevCh()}
            // PLAY/PAUSE
            else if([179,85,415].includes(k)){if(pv)V.tPP()}
            else if([178,86].includes(k)){if(pv)this.closeP()}
            // NUMBERS
            else if(this.isN(k))this.hNum(this.toN(k));
            // SEARCH
            else if([217,84].includes(k))$('srcIn').focus();
            // FAV
            else if([182,364,405].includes(k))this.tFav();
            // MENU
            else if([93,82].includes(k))this.openAdm();
            // INFO
            else if([457,165].includes(k)){if(pv)V.showC()}
            // GUIDE/BLUE
            else if([458,172,406].includes(k)){if(pv)this.tMini()}
            // RED
            else if([403].includes(k)){try{document.documentElement.requestFullscreen().catch(()=>{})}catch(e){}}
            // GREEN
            else if([404].includes(k)){if(pv)V.cyAsp()}
        });
    },

    isN(k){return(k>=48&&k<=57)||(k>=96&&k<=105)},
    toN(k){return k>=96?k-96:k-48},
    hNum(n){
        this._nb+=n;
        if(this.pVis()){
            $('osdN').textContent=this._nb;
            const ch=this.chByNum(parseInt(this._nb));
            $('osdNm').textContent=ch?ch.name:'';
            $('osdCh').classList.remove('hidden');
        }
        clearTimeout(this._nt);
        this._nt=setTimeout(()=>{
            const ch=this.chByNum(parseInt(this._nb));
            if(ch)this.playCh(ch.id);
            this._nb='';$('osdCh').classList.add('hidden');
        },2000);
    }
};

function admS(n,btn){
    document.querySelectorAll('.adm-s').forEach(s=>s.classList.remove('act'));
    document.querySelectorAll('.adm-nv button').forEach(b=>b.classList.remove('act'));
    const el=document.getElementById('a-'+n);if(el)el.classList.add('act');
    btn.classList.add('act');
}

function msg(t){const e=$('spMsg');if(e)e.textContent=t}

document.addEventListener('DOMContentLoaded',()=>A.init());
</script>
</body>
</html>
