<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Panel</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

<style>
body{margin:0;background:#0c0e14;color:#fff;font-family:sans-serif}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#1e2235;padding:10px;border-radius:10px;text-align:center;cursor:pointer}
.card.foc{outline:2px solid #4a7aff;transform:scale(1.05)}
video{width:100%;height:100%;background:black}
#player{position:fixed;inset:0;display:none}
#panel{position:fixed;top:10px;right:10px;background:#111;padding:10px;border-radius:10px;display:none}
button{padding:5px 10px}
</style>
</head>

<body>

<div id="grid"></div>

<div id="player">
<video id="video" autoplay></video>
</div>

<div id="panel">
<h3>Admin</h3>
<input id="url" style="width:200px"><br><br>
<button onclick="save()">Kaydet</button>
</div>

<script>
const M3U_URL="https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/merged.m3u"

const video=document.getElementById("video")
let hls=null
let channels=[]
let index=0

/* ================= PARSER ================= */
function parseM3U(text){
 const lines=text.split("\n")
 let list=[]
 let info=null

 lines.forEach(line=>{
  if(line.startsWith("#EXTINF")){
   info={
    name:line.split(",")[1]||"Kanal",
    group:(line.match(/group-title="(.*?)"/)||[])[1]||"Diğer"
   }
  }else if(line && !line.startsWith("#") && info){
   list.push({...info,url:line})
   info=null
  }
 })
 return list
}

/* ================= LOAD ================= */
async function load(){
 const txt=await fetch(M3U_URL).then(r=>r.text())
 channels=parseM3U(txt)
 render()
}

/* ================= RENDER ================= */
function render(){
 const g=document.getElementById("grid")
 g.innerHTML=""

 channels.slice(0,300).forEach((c,i)=>{
  const d=document.createElement("div")
  d.className="card"
  d.innerText=c.name
  d.onclick=()=>play(i)
  g.appendChild(d)
 })
 focus(0)
}

/* ================= PLAYER ================= */
function play(i){
 index=i
 const ch=channels[i]

 document.getElementById("player").style.display="block"

 if(hls){hls.destroy();hls=null}

 if(Hls.isSupported() && ch.url.includes(".m3u8")){
  hls=new Hls()
  hls.loadSource(ch.url)
  hls.attachMedia(video)
 }else{
  video.src=ch.url
 }

 video.play()
}

/* ================= NAV ================= */
let fi=0

function focus(i){
 const cards=document.querySelectorAll(".card")
 cards.forEach(c=>c.classList.remove("foc"))
 if(cards[i]){
  cards[i].classList.add("foc")
  cards[i].scrollIntoView({block:"nearest"})
 }
 fi=i
}

/* ================= KEY CONTROL ================= */
document.addEventListener("keydown",e=>{
 const cards=document.querySelectorAll(".card")

 if(e.key==="ArrowRight") focus(Math.min(cards.length-1,fi+1))
 if(e.key==="ArrowLeft") focus(Math.max(0,fi-1))
 if(e.key==="ArrowDown") focus(Math.min(cards.length-1,fi+6))
 if(e.key==="ArrowUp") focus(Math.max(0,fi-6))

 if(e.key==="Enter"){
  play(fi)
 }

 if(e.key==="Backspace" || e.key==="Escape"){
  document.getElementById("player").style.display="none"
  video.pause()
 }

 if(e.key==="a"){ // admin
  const pass=prompt("Şifre:")
  if(pass==="1234"){
   document.getElementById("panel").style.display="block"
   document.getElementById("url").value=M3U_URL
  }
 }
})

function save(){
 alert("Kaydedildi (demo)")
}

/* ================= START ================= */
load()
</script>

</body>
</html>
